<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — MediNeti Outreach</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        /* Login-specific overrides */
        body {
            padding: 16px;
            align-items: center;   /* vertically center the card */
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .login-card .page-header {
            text-align: center;
        }

        .login-form {
            padding: 36px 40px 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1e293b;
            background: #f9fafb;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15);
            background: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #0f766e;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #0d5e58;
        }

        .btn-login:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .error-msg {
            display: none;
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .error-msg.visible {
            display: block;
        }

        .login-footer {
            border-top: 1px solid #e2e8f0;
            padding: 16px 40px;
            color: #64748b;
            text-align: center;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="page-header">
        <h1>MediNeti Outreach</h1>
        <p>NABH Renewal Campaign Portal</p>
    </div>

    <form class="login-form" id="login-form" novalidate>

        <div id="error-msg" class="error-msg" role="alert"></div>

        <div class="form-group">
            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                autocomplete="username"
                placeholder="Enter username"
                required
            >
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                autocomplete="current-password"
                placeholder="Enter password"
                required
            >
        </div>

        <button type="submit" class="btn-login" id="login-btn">Sign In</button>

    </form>

    <div class="login-footer">
        MediNeti Healthcare Solutions • Internal Use Only
    </div>

</div>

<script>
    // If already logged in, redirect straight to dashboard
    if (localStorage.getItem('mn_token')) {
        window.location.replace('/');
    }

    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('login-btn');
    const errMsg  = document.getElementById('error-msg');

    function showError(msg) {
        errMsg.textContent = msg;
        errMsg.classList.add('visible');
    }

    function clearError() {
        errMsg.textContent = '';
        errMsg.classList.remove('visible');
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        clearError();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showError('Please enter both username and password.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in…';

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });

            const data = await res.json();

            if (res.ok && data.success) {
                localStorage.setItem('mn_token', data.token);
                window.location.replace('/');
            } else {
                showError(data.error || 'Login failed. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        } catch (err) {
            showError('Network error. Please check your connection.');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>

</body>
</html>
